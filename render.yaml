services:
  - type: web
    name: football-score-predictor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    autoDeploy: true
    envVars:
      - key: FOOTBALL_HOST
        value: 0.0.0.0
      - key: FOOTBALL_DEBUG
        value: "0"
