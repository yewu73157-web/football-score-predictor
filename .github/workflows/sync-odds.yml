name: Sync odds

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install requests
        run: python -m pip install requests
      - name: Sync Sporttery odds to site
        env:
          ODDS_SYNC_URL: ${{ vars.ODDS_SYNC_URL || 'https://gongwenjie.pythonanywhere.com/api/odds/sync' }}
          ODDS_SYNC_TOKEN: ${{ secrets.ODDS_SYNC_TOKEN || 'football-score-odds-sync-2026' }}
        run: python scripts/sync_odds.py
